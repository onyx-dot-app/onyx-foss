# Onyx Craft Docker-sandbox overlay. Layer on top of docker-compose.yml.
# install.sh --include-craft wires this in automatically.
#
# Trust boundary: api_server, background, and sandbox-proxy all bind-mount
# /var/run/docker.sock (root-equivalent on host). Only run on hosts you fully
# control.
services:
  api_server:
    environment:
      - SANDBOX_BACKEND=${SANDBOX_BACKEND:-docker}
      # Public Onyx URL; Internal compose hostnames don't resolve from the
      # sandbox bridge.
      - SANDBOX_API_SERVER_URL=${SANDBOX_API_SERVER_URL:-}
      - SANDBOX_CONTAINER_IMAGE=${SANDBOX_CONTAINER_IMAGE:-onyxdotapp/sandbox:${IMAGE_TAG:-latest}}
      # Pinned: Must match the compose `networks:` block + install.sh literal.
      # An env_file leak would point Python at a non-existent network.
      - SANDBOX_DOCKER_NETWORK=onyx_craft_sandbox
      - SANDBOX_DOCKER_MEMORY_LIMIT=${SANDBOX_DOCKER_MEMORY_LIMIT:-2g}
      - SANDBOX_DOCKER_CPU_LIMIT=${SANDBOX_DOCKER_CPU_LIMIT:-1.0}
      - ENABLE_OPENCODE_DEBUGGING=${ENABLE_OPENCODE_DEBUGGING:-false}
      # Pinned: Container-side bind target. Overrides host-path values that
      # the operator's .env may inject via env_file.
      - SANDBOX_DOCKER_SOCKET=/var/run/docker.sock
      # Pinned: Must match the sandbox container's entrypoint.sh hardcode.
      - OPENCODE_SERVE_PORT=4096
      # Proxy is mandatory; an explicit empty SANDBOX_PROXY_HOST raises at
      # api_server startup (see DockerSandboxManager._initialize).
      - SANDBOX_PROXY_HOST=${SANDBOX_PROXY_HOST-sandbox-proxy}
      - SANDBOX_PROXY_PORT=${SANDBOX_PROXY_PORT:-8080}
    volumes:
      - ${SANDBOX_DOCKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock
    networks:
      # Bridge join lets api_server proxy the Next.js preview iframe.
      - default
      - onyx_craft_sandbox
    # service_healthy, not service_started: The proxy binds its listener only
    # after initial sync, so service_started would race startup provisions.
    depends_on:
      sandbox-proxy:
        condition: service_healthy

  background:
    environment:
      # Must match api_server so the idle-cleanup celery task uses the same
      # backend to snapshot + terminate sandboxes.
      - SANDBOX_BACKEND=${SANDBOX_BACKEND:-docker}
      - SANDBOX_API_SERVER_URL=${SANDBOX_API_SERVER_URL:-}
      - SANDBOX_CONTAINER_IMAGE=${SANDBOX_CONTAINER_IMAGE:-onyxdotapp/sandbox:${IMAGE_TAG:-latest}}
      # See api_server above re: Pinned env_file-override vars.
      - SANDBOX_DOCKER_NETWORK=onyx_craft_sandbox
      - SANDBOX_DOCKER_MEMORY_LIMIT=${SANDBOX_DOCKER_MEMORY_LIMIT:-2g}
      - SANDBOX_DOCKER_CPU_LIMIT=${SANDBOX_DOCKER_CPU_LIMIT:-1.0}
      - ENABLE_OPENCODE_DEBUGGING=${ENABLE_OPENCODE_DEBUGGING:-false}
      - SANDBOX_DOCKER_SOCKET=/var/run/docker.sock
      - OPENCODE_SERVE_PORT=4096
      - SANDBOX_PROXY_HOST=${SANDBOX_PROXY_HOST-sandbox-proxy}
      - SANDBOX_PROXY_PORT=${SANDBOX_PROXY_PORT:-8080}
    volumes:
      - ${SANDBOX_DOCKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock
    networks:
      - default
      - onyx_craft_sandbox
    # See api_server above for the service_healthy rationale.
    depends_on:
      sandbox-proxy:
        condition: service_healthy

  # Egress proxy: MITMs sandbox HTTPS traffic and gates action approvals.
  sandbox-proxy:
    image: ${ONYX_BACKEND_IMAGE:-onyxdotapp/onyx-backend:${IMAGE_TAG:-latest}}
    command: ["python", "-m", "onyx.sandbox_proxy.server"]
    env_file:
      - path: .env
        required: false
    environment:
      - SANDBOX_BACKEND=docker
      - POSTGRES_HOST=${POSTGRES_HOST:-relational_db}
      - REDIS_HOST=${REDIS_HOST:-cache}
      # Pinned to defeat env_file leaks. See api_server above.
      - SANDBOX_DOCKER_SOCKET=/var/run/docker.sock
      - SANDBOX_DOCKER_NETWORK=onyx_craft_sandbox
      - SANDBOX_PROXY_LISTEN_PORT=${SANDBOX_PROXY_PORT:-8080}
      # Matches the healthcheck URL below.
      - SANDBOX_PROXY_HEALTHZ_PORT=8081
      # OnyxPatResolver reads this at boot to know which host to claim for PAT
      # injection. Without it, /me requests pass through bare with the
      # placeholder bearer and api_server 403s.
      - SANDBOX_API_SERVER_URL=${SANDBOX_API_SERVER_URL:-}
    volumes:
      - sandbox_proxy_ca:/var/lib/sandbox-proxy/ca
      # RO: the proxy only inspects (events watcher + initial sync).
      - ${SANDBOX_DOCKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock:ro
    depends_on:
      relational_db:
        condition: service_started
      cache:
        condition: service_started
    networks:
      # `default` reaches relational_db + cache by compose-DNS; the sandbox
      # bridge join makes the service resolvable as `sandbox-proxy` from inside
      # each sandbox container.
      - default
      - onyx_craft_sandbox
    restart: unless-stopped
    # >= _DRAIN_TIMEOUT_S (10s in server.py) plus margin so the SIGTERM drain
    # can terminalize parked approvals (claim EXPIRED + wake BLPOP listeners,
    # see gate._terminalize_after_unhandled_error) before docker tears the
    # container down. Matches K8s terminationGracePeriodSeconds.
    stop_grace_period: 20s
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8081/healthz')",
        ]
      interval: 10s
      timeout: 3s
      retries: 3
      # Matches server._LOOKUP_INITIAL_SYNC_TIMEOUT_S so a slow initial sync
      # doesn't race the healthcheck: if sync wins, next probe flips healthy; if
      # it loses, the process exits and docker restarts.
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "6"

networks:
  # Pre-created by install.sh --include-craft.
  onyx_craft_sandbox:
    name: onyx_craft_sandbox
    external: true

volumes:
  # Pre-created by install.sh --include-craft. external+name avoids the compose
  # project prefix so DockerSandboxManager can mount the same name when it
  # provisions sandbox containers from outside compose's project scope.
  sandbox_proxy_ca:
    name: sandbox_proxy_ca
    external: true
