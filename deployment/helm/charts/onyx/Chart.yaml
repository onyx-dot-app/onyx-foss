apiVersion: v2
name: onyx
description: A Helm chart for Kubernetes
home: https://www.onyx.app/
sources:
  - "https://github.com/onyx-dot-app/onyx"
type: application
version: 0.5.6
appVersion: latest
annotations:
  category: Productivity
  licenses: MIT
  images: |
    - name: webserver
      image: docker.io/onyxdotapp/onyx-web-server:latest
    - name: background
      image: docker.io/onyxdotapp/onyx-backend:latest
  artifacthub.io/changes: |
    - kind: added
      description: Safeguard against destructive upgrades from chart 0.4.x.
        A pre-render check fails `helm upgrade` if the legacy `da-vespa`
        StatefulSet is still present in the release namespace, so the
        Vespa data volume is not silently deleted by the 0.5.0 subchart
        removal. Override via legacyVespaCheck.acknowledged=true once
        migrated to external Vespa, or legacyVespaCheck.enabled=false
        to disable entirely. See deployment/helm/MIGRATION.md.
dependencies:
  - name: cloudnative-pg
    version: 0.26.0
    repository: https://cloudnative-pg.github.io/charts
    condition: postgresql.enabled
    alias: postgresql
  - name: opensearch
    version: 3.6.0
    repository: https://opensearch-project.github.io/helm-charts
    condition: opensearch.enabled
  - name: ingress-nginx
    version: 4.13.3
    repository: https://kubernetes.github.io/ingress-nginx
    condition: nginx.enabled
    alias: nginx
  # Installs the Redis CRD that the 'redis' subchart's CR binds to.
  - name: redis-operator
    version: 0.24.0
    repository: https://ot-container-kit.github.io/helm-charts
    condition: redis.enabled
  - name: redis
    version: 0.16.6
    repository: https://ot-container-kit.github.io/helm-charts
    condition: redis.enabled
  - name: minio
    version: 5.4.0
    repository: https://charts.min.io/
    condition: minio.enabled
  - name: code-interpreter
    version: 0.3.3
    repository: https://onyx-dot-app.github.io/python-sandbox/
    condition: codeInterpreter.enabled
