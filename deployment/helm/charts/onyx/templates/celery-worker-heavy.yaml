{{- if and .Values.vectorDB.enabled (gt (int .Values.celery_worker_heavy.replicaCount) 0) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "onyx.fullname" . }}-celery-worker-heavy
  labels:
    {{- include "onyx.labels" . | nindent 4 }}
    {{- with .Values.celery_worker_heavy.deploymentLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if not .Values.celery_worker_heavy.autoscaling.enabled }}
  replicas: {{ .Values.celery_worker_heavy.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "onyx.selectorLabels" . | nindent 6 }}
      {{- if .Values.celery_worker_heavy.deploymentLabels }}
      {{- toYaml .Values.celery_worker_heavy.deploymentLabels | nindent 6 }}
      {{- end }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      {{- with .Values.celery_worker_heavy.podAnnotations }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "onyx.labels" . | nindent 8 }}
        {{- with .Values.celery_worker_heavy.deploymentLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with .Values.celery_worker_heavy.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "onyx.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.celery_shared.podSecurityContext | nindent 8 }}
      {{- with .Values.celery_worker_heavy.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.celery_worker_heavy.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.celery_worker_heavy.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: celery-worker-heavy
          securityContext:
            {{- toYaml .Values.celery_shared.securityContext | nindent 12 }}
          image: "{{ .Values.celery_shared.image.repository }}:{{ .Values.celery_shared.image.tag | default .Values.global.version }}"
          imagePullPolicy: {{ .Values.global.pullPolicy }}
          command:
            [
              {{- with include "onyx.customCACerts.commandPrefix" . }}
              {{- . | nindent 14 }}
              {{- end }}
              "celery",
              "-A",
              "onyx.background.celery.versioned_apps.heavy",
              "worker",
              {{- with .Values.celery_worker_heavy.logLevel }}
              {{ printf "--loglevel=%s" . | quote }},
              {{- end }}
              "--hostname=heavy@%n",
              "-Q",
              "connector_pruning,connector_doc_permissions_sync,connector_external_group_sync,csv_generation,sandbox",
            ]
          ports:
            - name: metrics
              containerPort: 9094
              protocol: TCP
          resources:
            {{- toYaml .Values.celery_worker_heavy.resources | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ .Values.config.envConfigMapName }}
            {{- with .Values.extraEnvFromSecret }}
            - secretRef:
                name: {{ . }}
            {{- end }}
          env:
            {{- include "onyx.envSecrets" . | nindent 12}}
            {{- /* The heavy worker runs the `sandbox` queue (cleanup_idle_sandboxes →
                   create_snapshot / create_opencode_history_snapshot). Those POSTs are
                   signed with ONYX_SANDBOX_PUSH_PRIVATE_KEY, which (with the default
                   sandboxPushSecret.allPods=false) is only emitted via envSecretsRestricted.
                   Without it the sidecar client raises before sending and no snapshots are
                   created. Pairs with the heavy-worker rule in network-policy-sandbox-push. */}}
            {{- include "onyx.envSecretsRestricted" . | nindent 12}}
            {{- with include "onyx.customCACerts.env" . }}
            {{- . | nindent 12 }}
            {{- end }}
            {{- with .Values.celery_worker_heavy.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with include "onyx.volumeMountsWithCA" (dict "ctx" . "volumeMounts" .Values.celery_worker_heavy.volumeMounts) }}
          {{- . | nindent 10 }}
          {{- end }}
          startupProbe:
            {{ .Values.celery_shared.startupProbe | toYaml | nindent 12}}
          readinessProbe:
            {{ .Values.celery_shared.readinessProbe | toYaml | nindent 12}}
            exec:
              command:
                - /bin/bash
                - -c
                - >
                    python onyx/background/celery/celery_k8s_probe.py
                    --probe readiness
                    --filename /tmp/onyx_k8s_heavy_readiness.txt
          livenessProbe:
            {{ .Values.celery_shared.livenessProbe | toYaml | nindent 12}}
            exec:
              command:
                - /bin/bash
                - -c
                - >
                    python onyx/background/celery/celery_k8s_probe.py
                    --probe liveness
                    --filename /tmp/onyx_k8s_heavy_liveness.txt
      {{- with include "onyx.volumesWithCA" (dict "ctx" . "volumes" .Values.celery_worker_heavy.volumes) }}
      {{- . | nindent 6 }}
      {{- end }}
{{- end }}
