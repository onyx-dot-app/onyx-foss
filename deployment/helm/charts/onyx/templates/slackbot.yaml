{{- if .Values.slackbot.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "onyx.fullname" . }}-slackbot
  labels:
    {{- include "onyx.labels" . | nindent 4 }}
    {{- with .Values.slackbot.deploymentLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "onyx.selectorLabels" . | nindent 6 }}
      {{- if .Values.slackbot.deploymentLabels }}
      {{- toYaml .Values.slackbot.deploymentLabels | nindent 6 }}
      {{- end }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      {{- with .Values.slackbot.podAnnotations }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "onyx.labels" . | nindent 8 }}
        {{- with .Values.slackbot.deploymentLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with .Values.slackbot.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "onyx.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.slackbot.podSecurityContext | nindent 8 }}
      {{- with .Values.slackbot.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.slackbot.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.slackbot.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: slackbot
          securityContext:
            {{- toYaml .Values.slackbot.securityContext | nindent 12 }}
          image: "{{ .Values.slackbot.image.repository }}:{{ .Values.slackbot.image.tag | default .Values.global.version }}"
          imagePullPolicy: {{ .Values.global.pullPolicy }}
          command: [{{ include "onyx.customCACerts.commandPrefix" . }}"python", "onyx/onyxbot/slack/listener.py"]
          resources:
            {{- toYaml .Values.slackbot.resources | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ .Values.config.envConfigMapName }}
            {{- with .Values.extraEnvFromSecret }}
            - secretRef:
                name: {{ . }}
            {{- end }}
          env:
            {{- include "onyx.envSecrets" . | nindent 12}}
            {{- with include "onyx.customCACerts.env" . }}
            {{- . | nindent 12 }}
            {{- end }}
            {{- with .Values.slackbot.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with include "onyx.volumeMountsWithCA" (dict "ctx" . "volumeMounts" .Values.slackbot.volumeMounts) }}
          {{- . | nindent 10 }}
          {{- end }}
      {{- with include "onyx.volumesWithCA" (dict "ctx" . "volumes" .Values.slackbot.volumes) }}
      {{- . | nindent 6 }}
      {{- end }}
{{- end }}
