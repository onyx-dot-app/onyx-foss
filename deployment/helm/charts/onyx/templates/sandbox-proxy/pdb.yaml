{{- if and (eq (include "onyx.craftEnabled" .) "true") (gt (int ((.Values.sandboxProxy | default dict).replicaCount | default 1)) 1) }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "onyx.fullname" . }}-sandbox-proxy
  labels:
    {{- include "onyx.labels" . | nindent 4 }}
    app.kubernetes.io/component: sandbox-proxy
spec:
  minAvailable: 1
  selector:
    matchLabels:
      {{- include "onyx.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: sandbox-proxy
{{- end }}
