# NetworkPolicy: DNS-Egress erlauben
#
# Erlaubt allen Pods im Namespace, DNS-Anfragen an CoreDNS in kube-system zu senden.
# KRITISCH: Ohne diese Policy funktioniert keine Namensaufloesung — alle Services brechen.
#
# Ziel: DNS-Server (CoreDNS via kube-dns Service)
# Ports: UDP 53 + TCP 53 (TCP fuer grosse DNS-Antworten / Zone Transfers)
#
# Hinweis: Kein podSelector/namespaceSelector — StackIT/Gardener CoreDNS lauscht
# auf Port 8053 (Service mapped 53→8053). Da Calico nach DNAT evaluiert, wuerde
# ein podSelector mit port:53 nicht matchen. Port-basierte Filterung auf 53
# ist ausreichend — nur DNS-Traffic wird erlaubt.
#
# Audit-Referenz: C5/SEC-03 — docs/audit/networkpolicy-analyse.md
# Anwendung: kubectl apply -f 02-allow-dns-egress.yaml -n <namespace>

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  labels:
    app.kubernetes.io/part-of: voeb-chatbot
    app.kubernetes.io/component: network-policy
    security.voeb/policy-type: allow
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 8053
        - protocol: TCP
          port: 8053
