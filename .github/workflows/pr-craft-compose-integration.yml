# Stands up the full Craft docker-compose stack with the --include-craft overlay
# once per run and exercises the end-to-end approval-gate flow + the
# docker-specific posture invariants the K8s lane can't catch by construction
# (image ENTRYPOINT concat, HOME after setpriv, curl httpoxy on the bridge).
#
# Not per-PR -- the standup runs ~10-15 min cold. The narrower
# pr-craft-compose-tests lane keeps PR feedback fast; this one runs nightly, on
# every merge to main that touches the relevant paths, and on demand.

name: Craft Docker-Compose Integration

concurrency:
  group: Craft-Compose-Integration-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  schedule:
    - cron: "0 7 * * *"   # 07:00 UTC nightly
  push:
    branches: [main]
    paths:
      - "backend/onyx/sandbox_proxy/**"
      - "backend/onyx/server/features/build/sandbox/**"
      - "backend/onyx/server/features/build/approvals/**"
      - "backend/Dockerfile"
      - "deployment/docker_compose/docker-compose.yml"
      - "deployment/docker_compose/docker-compose.dev.yml"
      - "deployment/docker_compose/docker-compose.craft.yml"
      - "backend/tests/integration/tests/craft/docker_e2e/**"
      - ".github/workflows/pr-craft-compose-integration.yml"
      - ".github/actions/setup-python-and-install-dependencies/**"
  workflow_dispatch:

permissions:
  contents: read

env:
  # Pin S3_ENDPOINT_URL defensively. The runner env is usually clean, but we hit
  # a leak during local smoke (host shell exported localhost:9004, compose's
  # ${VAR:-default} picked it over --env-file). Belt-and-braces.
  S3_ENDPOINT_URL: "http://minio:9000"
  SANDBOX_BACKEND: "docker"
  ENABLE_CRAFT: "true"
  POSTGRES_PASSWORD: "password"
  POSTGRES_USER: "postgres"
  IMAGE_TAG: "latest"
  # Pin to a CI-only tag so the locally-built sandbox image is what compose
  # passes to api_server, and what DockerSandboxManager.provision then loads
  # into each sandbox container. Without this, compose falls back to
  # docker-compose.craft.yml's default version tag (currently v0.1.52); docker
  # then pulls that published image from Docker Hub and the locally-built image
  # is dead weight -- the lane silently runs against the public image instead of
  # the tree under test.
  SANDBOX_CONTAINER_IMAGE: "onyxdotapp/sandbox:ci"

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      PYTHONPATH: ./backend
      DISABLE_TELEMETRY: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Python + deps
        uses: ./.github/actions/setup-python-and-install-dependencies
        with:
          requirements: |
            backend/requirements/default.txt
            backend/requirements/dev.txt
            backend/requirements/ee.txt

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # ratchet:docker/setup-buildx-action@v4

      - name: Build sandbox image (proxy-aware firewall-init.sh + opencode)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: ./backend/onyx/server/features/build/sandbox/image
          file: ./backend/onyx/server/features/build/sandbox/image/Dockerfile
          tags: ${{ env.SANDBOX_CONTAINER_IMAGE }}
          load: true
          build-args: |
            ENABLE_SKILLS=false
          cache-from: type=gha,scope=craft-compose-sandbox
          cache-to: type=gha,scope=craft-compose-sandbox,mode=max

      - name: Build backend image (api_server + background + sandbox-proxy)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: ./backend
          file: ./backend/Dockerfile
          tags: onyxdotapp/onyx-backend:latest
          load: true
          cache-from: type=gha,scope=craft-compose-backend
          cache-to: type=gha,scope=craft-compose-backend,mode=max

      - name: Create compose-external resources
        run: |
          docker network create onyx_craft_sandbox
          docker volume create sandbox_proxy_ca

      # TODO(ods): Replace with `ods compose --craft` once that flag is
      # added to tools/ods/cmd/compose.go. Today `ods compose` doesn't support
      # the craft overlay, so we drop to raw docker compose.
      - name: Bring up the stack (yml + dev + craft)
        working-directory: deployment/docker_compose
        run: |
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.dev.yml \
            -f docker-compose.craft.yml \
            --env-file env.template \
            up -d --wait --wait-timeout 600

      - name: Sanity check stack health
        # --fail: without it, curl exits 0 on 4xx/5xx and the step would accept
        # an unhealthy api_server. -w still emits on --fail.
        run: |
          docker ps --format 'table {{.Names}}\t{{.Status}}'
          curl --fail -sS -o /dev/null -w "api_server /health -> %{http_code}\n" \
            http://localhost:8080/health

      - name: Run integration tests
        # Working dir = backend/ so alembic.ini is a relative path for the
        # reset_all() fixture.
        working-directory: backend
        env:
          # API_SERVER_URL and POSTGRES_* must point at the compose-published
          # host ports (set by docker-compose.dev.yml).
          API_SERVER_HOST: "127.0.0.1"
          API_SERVER_PORT: "8080"
          POSTGRES_DB: "postgres"
          POSTGRES_HOST: "127.0.0.1"
          POSTGRES_PORT: "5432"
          REDIS_HOST: "127.0.0.1"
          REDIS_PORT: "6379"
          # The integration framework imports onyx.* at module load and needs
          # craft + proxy env in place so DockerSandboxManager initializes.
          ENABLE_CRAFT: "true"
          ENABLE_PAID_ENTERPRISE_EDITION_FEATURES: "true"
          SANDBOX_BACKEND: "docker"
          SANDBOX_PROXY_HOST: "sandbox-proxy"
          SANDBOX_PROXY_PORT: "8080"
          SANDBOX_API_SERVER_URL: "http://api_server:8080"
          SANDBOX_DOCKER_NETWORK: "onyx_craft_sandbox"
          SANDBOX_DOCKER_SOCKET: "/var/run/docker.sock"
        run: |
          source ../.venv/bin/activate
          python -m pytest \
            -v \
            --tb=short \
            --durations=10 \
            tests/integration/tests/craft/docker_e2e/test_approval_gate_docker.py

      - name: Stack state + logs on failure
        if: failure()
        working-directory: deployment/docker_compose
        run: |
          echo "=== docker ps -a ==="; docker ps -a || true
          echo "=== api_server logs ==="; docker logs --tail 200 onyx-api_server-1 || true
          echo "=== sandbox-proxy logs ==="; docker logs --tail 200 onyx-sandbox-proxy-1 || true
          echo "=== background logs ==="; docker logs --tail 100 onyx-background-1 || true
          echo "=== sandbox-* logs ==="; \
            for c in $(docker ps -aq --filter "name=sandbox-" | grep -v sandbox-proxy || true); do \
              echo "--- $c ---"; docker logs --tail 200 "$c" || true; \
            done

      # Always tear down. -v removes named volumes inside the compose project
      # but the externally-declared sandbox_proxy_ca + onyx_craft_sandbox
      # survive (compose down doesn't touch external resources). The runner is
      # ephemeral so leftover state is moot, but explicit is cleaner.
      - name: Teardown
        if: always()
        working-directory: deployment/docker_compose
        run: |
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.dev.yml \
            -f docker-compose.craft.yml \
            down -v || true
          docker volume rm sandbox_proxy_ca || true
          docker network rm onyx_craft_sandbox || true
