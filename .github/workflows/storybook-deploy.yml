name: Storybook Deploy
env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: prj_sG49mVsA25UsxIPhN2pmBJlikJZM
  VERCEL_CLI: vercel@50.14.1
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

concurrency:
  group: storybook-deploy-production
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "web/lib/opal/**"
      - "web/src/refresh-components/**"
      - "web/.storybook/**"
      - "web/src/app/craft/components/tool-cards/**"
      - "web/src/app/craft/components/approvals/**"
      - "web/package.json"
      - "web/bun.lock"
permissions:
  contents: read
jobs:
  Deploy-Storybook:
    runs-on: ubuntu-latest
    environment: ci-protected
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # ratchet:oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Install dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Build Storybook
        working-directory: web
        run: bun run storybook:build

      - name: Deploy to Vercel (Production)
        working-directory: web
        run: bunx "$VERCEL_CLI" deploy storybook-static/ --prod --yes --token="$VERCEL_TOKEN"

  notify-slack-on-failure:
    needs: Deploy-Storybook
    if: always() && needs.Deploy-Storybook.result == 'failure'
    runs-on: ubuntu-latest
    environment: ci-protected
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v4
        with:
          persist-credentials: false
          sparse-checkout: .github/actions/slack-notify

      - name: Send Slack notification
        uses: ./.github/actions/slack-notify
        with:
          webhook-url: ${{ secrets.MONITOR_DEPLOYMENTS_WEBHOOK }}
          failed-jobs: "• Deploy-Storybook"
          title: "🚨 Storybook Deploy Failed"
