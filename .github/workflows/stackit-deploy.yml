# ===========================================================
# StackIT Build & Deploy Pipeline
# ===========================================================
# Triggers:
#   - Push auf main → Automatisch DEV deployen
#   - Manuell → Environment wählbar (dev/test/prod)
#
# Build-Architektur:
#   - Backend + Frontend werden PARALLEL gebaut (je ~7 Min)
#   - Model Server wird NICHT gebaut (identisch mit Upstream, nutzt Docker Hub Image)
#   - Gesamte Build-Zeit: ~7-8 Minuten statt ~35 Minuten
#
# Voraussetzungen (GitHub Secrets):
#   Global:
#     - STACKIT_REGISTRY_USER      (Robot Account Name aus Container Registry)
#     - STACKIT_REGISTRY_PASSWORD  (Robot Account Token aus Container Registry)
#     - STACKIT_KUBECONFIG         (base64-encoded, Ablauf prüfen! Aktuell: 2026-05-28)
#   Per Environment (dev/test/prod):
#     - POSTGRES_PASSWORD          (Managed PG Flex App-User Passwort)
#     - S3_ACCESS_KEY_ID           (StackIT Object Storage)
#     - S3_SECRET_ACCESS_KEY       (StackIT Object Storage)
#     - DB_READONLY_PASSWORD       (PG Readonly User für Knowledge Graph)
#     - REDIS_PASSWORD             (Redis Standalone Passwort)
#
# Hinweis: Die StackIT Project ID (UUID) wird NICHT als Secret benötigt.
# Die Container Registry nutzt einen eigenen Projektnamen (REGISTRY_PROJECT).
# ===========================================================

name: StackIT Build & Deploy

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.claude/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - dev
          - test
          - prod
      image_tag:
        description: 'Image tag (default: git SHA)'
        required: false
        type: string

# Least-Privilege: Nur Lesezugriff auf Repo-Inhalte.
permissions:
  contents: read

# Nur ein Deploy pro Environment gleichzeitig. Laufende Builds bei neuem Push abbrechen.
concurrency:
  group: deploy-${{ github.event.inputs.environment || 'dev' }}
  cancel-in-progress: true

env:
  REGISTRY: registry.onstackit.cloud
  REGISTRY_PROJECT: voeb-chatbot
  HELM_CHART_PATH: deployment/helm/charts/onyx
  # Model Server: Upstream-Image von Docker Hub (wir ändern nichts am Model Server).
  # Gepinnt auf konkrete Version — ":latest" ist nicht reproduzierbar.
  # Bei Upstream-Update: Tag hier und in MEMORY.md aktualisieren.
  MODEL_SERVER_REPO: docker.io/onyxdotapp/onyx-model-server
  MODEL_SERVER_TAG: v2.9.8

jobs:
  # =========================================================
  # PREPARE: Image Tag bestimmen (wird von Build-Jobs genutzt)
  # =========================================================
  prepare:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.value }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Determine image tag
        id: tag
        env:
          INPUT_TAG: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_TAG:-}" ]; then
            # Docker Tag Spec: Start mit [a-zA-Z0-9_], dann [a-zA-Z0-9._-], max 128 Zeichen
            if ! echo "$INPUT_TAG" | grep -qxE '[a-zA-Z0-9_][a-zA-Z0-9._-]{0,127}'; then
              echo "::error::Invalid image tag '${INPUT_TAG}'. Must match Docker tag spec: [a-zA-Z0-9_][a-zA-Z0-9._-]{0,127}"
              exit 1
            fi
            echo "value=${INPUT_TAG}" >> $GITHUB_OUTPUT
          else
            echo "value=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          fi

  # =========================================================
  # BUILD BACKEND: Parallel mit Frontend
  # =========================================================
  build-backend:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Login to StackIT Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.STACKIT_REGISTRY_USER }}
          password: ${{ secrets.STACKIT_REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build & Push Backend
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ./backend
          push: true
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max
          tags: |
            ${{ env.REGISTRY }}/${{ env.REGISTRY_PROJECT }}/onyx-backend:${{ needs.prepare.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ env.REGISTRY_PROJECT }}/onyx-backend:latest

  # =========================================================
  # BUILD FRONTEND: Parallel mit Backend
  # =========================================================
  build-frontend:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Login to StackIT Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.STACKIT_REGISTRY_USER }}
          password: ${{ secrets.STACKIT_REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build & Push Frontend
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ./web
          push: true
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max
          tags: |
            ${{ env.REGISTRY }}/${{ env.REGISTRY_PROJECT }}/onyx-web-server:${{ needs.prepare.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ env.REGISTRY_PROJECT }}/onyx-web-server:latest

  # =========================================================
  # DEPLOY DEV: Automatisch bei push auf main
  # =========================================================
  deploy-dev:
    needs: [prepare, build-backend, build-frontend]
    if: >
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'dev')
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Helm
        uses: azure/setup-helm@bf6a7d304bc2fdb57e0331155b7ebf2c504acf0a # v4
        with:
          version: 'v3.16.0'

      - name: Setup kubectl
        uses: azure/setup-kubectl@c0c8b32d33a5244f1e5947304550403b63930415 # v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.STACKIT_KUBECONFIG }}" | base64 -d > ~/.kube/config

      - name: Add Helm repositories
        run: |
          helm repo add cloudnative-pg https://cloudnative-pg.github.io/charts
          helm repo add vespa https://onyx-dot-app.github.io/vespa-helm-charts
          helm repo add opensearch https://opensearch-project.github.io/helm-charts
          helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
          helm repo add redis-operator https://ot-container-kit.github.io/helm-charts
          helm repo add minio https://charts.min.io/
          helm repo add python-sandbox https://onyx-dot-app.github.io/python-sandbox/

      - name: Build Helm dependencies
        run: helm dependency build ${{ env.HELM_CHART_PATH }}

      - name: Deploy to DEV
        run: |
          IMAGE_TAG="${{ needs.prepare.outputs.image_tag }}"
          REGISTRY="${{ env.REGISTRY }}"
          PROJECT="${{ env.REGISTRY_PROJECT }}"

          helm upgrade --install onyx-dev \
            ${{ env.HELM_CHART_PATH }} \
            --namespace onyx-dev \
            --create-namespace \
            --history-max 5 \
            -f deployment/helm/values/values-common.yaml \
            -f deployment/helm/values/values-dev.yaml \
            --set "global.version=${IMAGE_TAG}" \
            --set "api.image.repository=${REGISTRY}/${PROJECT}/onyx-backend" \
            --set "webserver.image.repository=${REGISTRY}/${PROJECT}/onyx-web-server" \
            --set "celery_shared.image.repository=${REGISTRY}/${PROJECT}/onyx-backend" \
            --set "inferenceCapability.image.repository=${{ env.MODEL_SERVER_REPO }}" \
            --set "inferenceCapability.image.tag=${{ env.MODEL_SERVER_TAG }}" \
            --set "indexCapability.image.repository=${{ env.MODEL_SERVER_REPO }}" \
            --set "indexCapability.image.tag=${{ env.MODEL_SERVER_TAG }}" \
            --set "auth.postgresql.values.password=${{ secrets.POSTGRES_PASSWORD }}" \
            --set "auth.redis.values.redis_password=${{ secrets.REDIS_PASSWORD }}" \
            --set "auth.objectstorage.values.s3_aws_access_key_id=${{ secrets.S3_ACCESS_KEY_ID }}" \
            --set "auth.objectstorage.values.s3_aws_secret_access_key=${{ secrets.S3_SECRET_ACCESS_KEY }}" \
            --set "auth.dbreadonly.values.db_readonly_password=${{ secrets.DB_READONLY_PASSWORD }}" \
            --timeout 10m

      # DEV läuft auf einem einzelnen g1a.4d Node (4 vCPU). Helm's Default RollingUpdate
      # startet neue Pods neben den alten — dafür reicht die CPU nicht (Pending).
      # Fix: Recreate-Strategie per kubectl patch, dann rollout abwarten.
      # Chart-Templates für api/webserver/celery haben keinen strategy-Block in Values.
      - name: Patch deployment strategy and wait (single-node DEV)
        run: |
          NAMESPACE="onyx-dev"
          DEPLOYMENTS="onyx-dev-api-server onyx-dev-celery-worker-primary onyx-dev-web-server onyx-dev-celery-beat"

          for dep in $DEPLOYMENTS; do
            echo "Patching $dep to Recreate strategy..."
            kubectl patch deployment "$dep" -n "$NAMESPACE" \
              --type='json' \
              -p='[{"op":"replace","path":"/spec/strategy","value":{"type":"Recreate"}}]'
          done

          echo "Waiting for all deployments to be ready..."
          FAILED=0
          for dep in $DEPLOYMENTS onyx-dev-indexing-model onyx-dev-inference-model; do
            echo "  Waiting for $dep..."
            if ! kubectl rollout status deployment/"$dep" -n "$NAMESPACE" --timeout=10m; then
              echo "::error::Deployment $dep failed to become ready"
              kubectl describe deployment/"$dep" -n "$NAMESPACE" | tail -20
              kubectl logs deployment/"$dep" -n "$NAMESPACE" --tail=30 || true
              FAILED=1
            fi
          done
          if [ "$FAILED" -eq 1 ]; then
            exit 1
          fi

      - name: Smoke test
        run: |
          echo "Waiting for API to be reachable..."
          DOMAIN=$(kubectl get configmap env-configmap -n onyx-dev -o jsonpath='{.data.WEB_DOMAIN}')
          for i in $(seq 1 12); do
            if curl --silent --fail --max-time 5 "${DOMAIN}/api/health" > /dev/null 2>&1; then
              echo "Health check passed: ${DOMAIN}/api/health"
              exit 0
            fi
            echo "  Attempt $i/12 — waiting 10s..."
            sleep 10
          done
          echo "::error::Health check failed after 2 minutes"
          exit 1

      - name: Verify deployment
        if: always()
        run: |
          echo "=== Pods ==="
          kubectl get pods -n onyx-dev
          echo "=== Services ==="
          kubectl get svc -n onyx-dev

  # =========================================================
  # DEPLOY TEST: Manuell
  # =========================================================
  deploy-test:
    needs: [prepare, build-backend, build-frontend]
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'test'
    runs-on: ubuntu-latest
    environment: test

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Helm
        uses: azure/setup-helm@bf6a7d304bc2fdb57e0331155b7ebf2c504acf0a # v4
        with:
          version: 'v3.16.0'

      - name: Setup kubectl
        uses: azure/setup-kubectl@c0c8b32d33a5244f1e5947304550403b63930415 # v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.STACKIT_KUBECONFIG }}" | base64 -d > ~/.kube/config

      - name: Add Helm repositories
        run: |
          helm repo add cloudnative-pg https://cloudnative-pg.github.io/charts
          helm repo add vespa https://onyx-dot-app.github.io/vespa-helm-charts
          helm repo add opensearch https://opensearch-project.github.io/helm-charts
          helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
          helm repo add redis-operator https://ot-container-kit.github.io/helm-charts
          helm repo add minio https://charts.min.io/
          helm repo add python-sandbox https://onyx-dot-app.github.io/python-sandbox/

      - name: Build Helm dependencies
        run: helm dependency build ${{ env.HELM_CHART_PATH }}

      - name: Deploy to TEST
        run: |
          IMAGE_TAG="${{ needs.prepare.outputs.image_tag }}"
          REGISTRY="${{ env.REGISTRY }}"
          PROJECT="${{ env.REGISTRY_PROJECT }}"

          helm upgrade --install onyx-test \
            ${{ env.HELM_CHART_PATH }} \
            --namespace onyx-test \
            --create-namespace \
            --history-max 5 \
            -f deployment/helm/values/values-common.yaml \
            -f deployment/helm/values/values-test.yaml \
            --set "global.version=${IMAGE_TAG}" \
            --set "api.image.repository=${REGISTRY}/${PROJECT}/onyx-backend" \
            --set "webserver.image.repository=${REGISTRY}/${PROJECT}/onyx-web-server" \
            --set "celery_shared.image.repository=${REGISTRY}/${PROJECT}/onyx-backend" \
            --set "inferenceCapability.image.repository=${{ env.MODEL_SERVER_REPO }}" \
            --set "inferenceCapability.image.tag=${{ env.MODEL_SERVER_TAG }}" \
            --set "indexCapability.image.repository=${{ env.MODEL_SERVER_REPO }}" \
            --set "indexCapability.image.tag=${{ env.MODEL_SERVER_TAG }}" \
            --set "auth.postgresql.values.password=${{ secrets.POSTGRES_PASSWORD }}" \
            --set "auth.redis.values.redis_password=${{ secrets.REDIS_PASSWORD }}" \
            --set "auth.objectstorage.values.s3_aws_access_key_id=${{ secrets.S3_ACCESS_KEY_ID }}" \
            --set "auth.objectstorage.values.s3_aws_secret_access_key=${{ secrets.S3_SECRET_ACCESS_KEY }}" \
            --set "auth.dbreadonly.values.db_readonly_password=${{ secrets.DB_READONLY_PASSWORD }}" \
            --atomic --timeout 10m

      - name: Smoke test
        run: |
          echo "Waiting for API to be reachable..."
          DOMAIN=$(kubectl get configmap env-configmap -n onyx-test -o jsonpath='{.data.WEB_DOMAIN}')
          for i in $(seq 1 12); do
            if curl --silent --fail --max-time 5 "${DOMAIN}/api/health" > /dev/null 2>&1; then
              echo "Health check passed: ${DOMAIN}/api/health"
              exit 0
            fi
            echo "  Attempt $i/12 — waiting 10s..."
            sleep 10
          done
          echo "::error::Health check failed after 2 minutes"
          exit 1

      - name: Verify deployment
        if: always()
        run: |
          echo "=== Pods ==="
          kubectl get pods -n onyx-test
          echo "=== Services ==="
          kubectl get svc -n onyx-test

  # =========================================================
  # DEPLOY PROD: Manuell + Required Reviewers
  # =========================================================
  deploy-prod:
    needs: [prepare, build-backend, build-frontend]
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'prod'
    runs-on: ubuntu-latest
    environment:
      name: prod
      # In GitHub Settings: Required reviewers aktivieren!

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Helm
        uses: azure/setup-helm@bf6a7d304bc2fdb57e0331155b7ebf2c504acf0a # v4
        with:
          version: 'v3.16.0'

      - name: Setup kubectl
        uses: azure/setup-kubectl@c0c8b32d33a5244f1e5947304550403b63930415 # v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.STACKIT_KUBECONFIG }}" | base64 -d > ~/.kube/config

      - name: Add Helm repositories
        run: |
          helm repo add cloudnative-pg https://cloudnative-pg.github.io/charts
          helm repo add vespa https://onyx-dot-app.github.io/vespa-helm-charts
          helm repo add opensearch https://opensearch-project.github.io/helm-charts
          helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
          helm repo add redis-operator https://ot-container-kit.github.io/helm-charts
          helm repo add minio https://charts.min.io/
          helm repo add python-sandbox https://onyx-dot-app.github.io/python-sandbox/

      - name: Build Helm dependencies
        run: helm dependency build ${{ env.HELM_CHART_PATH }}

      - name: Deploy to PROD
        run: |
          IMAGE_TAG="${{ needs.prepare.outputs.image_tag }}"
          REGISTRY="${{ env.REGISTRY }}"
          PROJECT="${{ env.REGISTRY_PROJECT }}"

          helm upgrade --install onyx-prod \
            ${{ env.HELM_CHART_PATH }} \
            --namespace onyx-prod \
            --create-namespace \
            --history-max 5 \
            -f deployment/helm/values/values-common.yaml \
            -f deployment/helm/values/values-prod.yaml \
            --set "global.version=${IMAGE_TAG}" \
            --set "api.image.repository=${REGISTRY}/${PROJECT}/onyx-backend" \
            --set "webserver.image.repository=${REGISTRY}/${PROJECT}/onyx-web-server" \
            --set "celery_shared.image.repository=${REGISTRY}/${PROJECT}/onyx-backend" \
            --set "inferenceCapability.image.repository=${{ env.MODEL_SERVER_REPO }}" \
            --set "inferenceCapability.image.tag=${{ env.MODEL_SERVER_TAG }}" \
            --set "indexCapability.image.repository=${{ env.MODEL_SERVER_REPO }}" \
            --set "indexCapability.image.tag=${{ env.MODEL_SERVER_TAG }}" \
            --set "auth.postgresql.values.password=${{ secrets.POSTGRES_PASSWORD }}" \
            --set "auth.redis.values.redis_password=${{ secrets.REDIS_PASSWORD }}" \
            --set "auth.objectstorage.values.s3_aws_access_key_id=${{ secrets.S3_ACCESS_KEY_ID }}" \
            --set "auth.objectstorage.values.s3_aws_secret_access_key=${{ secrets.S3_SECRET_ACCESS_KEY }}" \
            --set "auth.dbreadonly.values.db_readonly_password=${{ secrets.DB_READONLY_PASSWORD }}" \
            --atomic --timeout 15m

      - name: Smoke test
        run: |
          echo "Waiting for API to be reachable..."
          DOMAIN=$(kubectl get configmap env-configmap -n onyx-prod -o jsonpath='{.data.WEB_DOMAIN}')
          for i in $(seq 1 18); do
            if curl --silent --fail --max-time 5 "${DOMAIN}/api/health" > /dev/null 2>&1; then
              echo "Health check passed: ${DOMAIN}/api/health"
              exit 0
            fi
            echo "  Attempt $i/18 — waiting 10s..."
            sleep 10
          done
          echo "::error::Health check failed after 3 minutes"
          exit 1

      - name: Verify PROD deployment
        if: always()
        run: |
          echo "=== Pods ==="
          kubectl get pods -n onyx-prod
          echo "=== Services ==="
          kubectl get svc -n onyx-prod
          echo "=== Ingress ==="
          kubectl get ingress -n onyx-prod
